<!DOCTYPE html>
<html>
<head>
    <title>URL Shortener</title>
</head>
<body>
    <h2>Simple URL Shortener</h2>

    <form action="/shorten" method="POST">
        <input type="url"
               name="long_url"
               placeholder="Enter Long URL"
               required>

        <button type="submit">
            Shorten URL
        </button>
    </form>
</body>
</html>
